<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 01 - Coulomb Force at the Center of a Square</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f5f7fb;
      color:#1a1a1a;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:20px;
      display:grid;
      grid-template-columns:320px 1fr;
      gap:20px;
    }
    .panel,.view{
      background:#fff;
      border-radius:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      padding:18px;
    }
    h1{font-size:24px;margin-top:0}
    h2{font-size:18px;margin:8px 0 12px}
    label{display:block;margin-top:12px;font-weight:700}
    input{width:100%;padding:10px;border:1px solid #cfd7e6;border-radius:10px;margin-top:6px;box-sizing:border-box}
    button{
      margin-top:16px;padding:12px 14px;border:0;border-radius:10px;
      background:#1f6feb;color:#fff;font-weight:700;cursor:pointer;width:100%;
    }
    .out{
      margin-top:16px;background:#f7f9fc;border-radius:10px;padding:12px;line-height:1.6
    }
    canvas{width:100%;height:auto;border:1px solid #dbe3ef;border-radius:12px;background:#ffffff}
    .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:14px}
    .legend span{display:inline-flex;align-items:center;gap:6px}
    .swatch{width:14px;height:14px;border-radius:50%}
    @media (max-width:900px){
      .container{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Task 01</h1>
      <h2>Interactive Coulomb Calculator</h2>

      <label>Corner charge q (C)</label>
      <input id="qCorner" type="number" step="0.1" value="1.0" />

      <label>Center charge Q (C)</label>
      <input id="qCenter" type="number" step="0.1" value="-2.0" />

      <label>Square side a (m)</label>
      <input id="side" type="number" step="0.1" value="1.0" />

      <button id="updateBtn">Update</button>

      <div class="out" id="results"></div>
    </div>

    <div class="view">
      <h2>Force Diagram</h2>
      <canvas id="canvas" width="700" height="700"></canvas>
      <div class="legend">
        <span><span class="swatch" style="background:#e74c3c"></span>Positive corner charge</span>
        <span><span class="swatch" style="background:#2e86de"></span>Central charge</span>
        <span><span class="swatch" style="background:#27ae60"></span>Individual force vectors</span>
        <span><span class="swatch" style="background:#8e44ad"></span>Net force</span>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const results = document.getElementById("results");

    function forceMagnitude(q, Q, a){
      const r = a * Math.sqrt(2) / 2;
      return 8.99e9 * Math.abs(q * Q) / (r * r);
    }

    function drawArrow(x1,y1,x2,y2,color,width=3){
      const head = 12;
      const angle = Math.atan2(y2-y1,x2-x1);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x2,y2);
      ctx.lineTo(x2 - head*Math.cos(angle - Math.PI/6), y2 - head*Math.sin(angle - Math.PI/6));
      ctx.lineTo(x2 - head*Math.cos(angle + Math.PI/6), y2 - head*Math.sin(angle + Math.PI/6));
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function draw(){
      const q = parseFloat(document.getElementById("qCorner").value);
      const Q = parseFloat(document.getElementById("qCenter").value);
      const a = parseFloat(document.getElementById("side").value);

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const cx = canvas.width/2;
      const cy = canvas.height/2;
      const scale = 180;

      const corners = [
        {x:cx - scale, y:cy - scale},
        {x:cx + scale, y:cy - scale},
        {x:cx + scale, y:cy + scale},
        {x:cx - scale, y:cy + scale}
      ];

      ctx.strokeStyle = "#333";
      ctx.lineWidth = 2;
      ctx.strokeRect(cx-scale, cy-scale, 2*scale, 2*scale);

      corners.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,12,0,Math.PI*2);
        ctx.fillStyle = "#e74c3c";
        ctx.fill();
      });

      ctx.beginPath();
      ctx.arc(cx,cy,14,0,Math.PI*2);
      ctx.fillStyle = "#2e86de";
      ctx.fill();

      const F1 = forceMagnitude(q,Q,a);
      const attractive = q*Q < 0;
      const vectors = [];

      corners.forEach(p=>{
        let dx = p.x - cx;
        let dy = p.y - cy;
        const len = Math.hypot(dx,dy);
        dx /= len; dy /= len;
        const dir = attractive ? 1 : -1;
        vectors.push({x:dir*dx, y:dir*dy});
        drawArrow(cx,cy,cx + dir*dx*120, cy + dir*dy*120, "#27ae60", 3);
      });

      const net = vectors.reduce((acc,v)=>({x:acc.x+v.x, y:acc.y+v.y}), {x:0,y:0});
      drawArrow(cx,cy,cx + net.x*120, cy + net.y*120, "#8e44ad", 5);

      const r = a*Math.sqrt(2)/2;
      results.innerHTML = `
        <strong>Distance center to corner:</strong> ${r.toFixed(4)} m<br>
        <strong>Force from one corner:</strong> ${F1.toExponential(4)} N<br>
        <strong>Symmetry result:</strong> opposite vectors cancel exactly<br>
        <strong>Net force magnitude:</strong> 0 N<br>
        <strong>Net direction:</strong> undefined
      `;
    }

    document.getElementById("updateBtn").addEventListener("click", draw);
    draw();
  </script>
</body>
</html>
