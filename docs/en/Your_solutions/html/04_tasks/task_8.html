<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 08 - Lorentz Force Calculator</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f8fc}
    .container{max-width:1120px;margin:0 auto;padding:20px;display:grid;grid-template-columns:330px 1fr;gap:20px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    label{display:block;margin-top:10px;font-weight:700}
    input{width:100%;padding:10px;border:1px solid #d4deea;border-radius:10px;box-sizing:border-box;margin-top:6px}
    button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;font-weight:700;cursor:pointer}
    .out{margin-top:14px;background:#f7f9fc;padding:12px;border-radius:10px;line-height:1.7}
    canvas{width:100%;height:auto;border:1px solid #dce5ef;border-radius:12px;background:#fff}
    @media (max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Task 08</h1>
    <p>Interactive magnetic Lorentz force calculator.</p>

    <label>Charge q (C)</label>
    <input id="q" type="number" step="1e-20" value="2e-19">

    <label>Speed v (m/s)</label>
    <input id="v" type="number" step="10000" value="1e6">

    <label>Magnetic field B (T)</label>
    <input id="B" type="number" step="0.01" value="0.5">

    <label>Angle θ (degrees)</label>
    <input id="theta" type="number" step="1" value="90">

    <button id="btn">Compute</button>
    <div class="out" id="out"></div>
  </div>

  <div class="card">
    <h2>Vector Geometry</h2>
    <canvas id="canvas" width="740" height="500"></canvas>
  </div>
</div>

<script>
const out = document.getElementById('out');
const ctx = document.getElementById('canvas').getContext('2d');

function compute(){
  const q = parseFloat(document.getElementById('q').value);
  const v = parseFloat(document.getElementById('v').value);
  const B = parseFloat(document.getElementById('B').value);
  const theta = parseFloat(document.getElementById('theta').value) * Math.PI/180;
  const F = Math.abs(q*v*B*Math.sin(theta));

  out.innerHTML = `
    <strong>Magnetic force magnitude:</strong> ${F.toExponential(6)} N<br>
    <strong>Formula:</strong> F = qvB sinθ<br>
    <strong>sinθ:</strong> ${Math.sin(theta).toFixed(6)}
  `;

  draw(theta,F);
}

function draw(theta,F){
  ctx.clearRect(0,0,740,500);
  const ox=230, oy=320, L=140;

  ctx.fillStyle = "#111";
  ctx.font = "18px Arial";
  ctx.fillText(`F = ${F.toExponential(3)} N`, 20, 30);

  // velocity vector
  drawArrow(ox,oy,ox+L,oy,"#27ae60");
  ctx.fillText("v", ox+L+12, oy+5);

  // B vector
  const bx = ox + L*Math.cos(-theta);
  const by = oy + L*Math.sin(-theta);
  drawArrow(ox,oy,bx,by,"#3498db");
  ctx.fillText("B", bx+12, by+5);

  // angle arc
  ctx.strokeStyle = "#7f8c8d";
  ctx.beginPath();
  ctx.arc(ox,oy,50,0,-theta,true);
  ctx.stroke();
  ctx.fillText(`θ=${(theta*180/Math.PI).toFixed(1)}°`, ox+35, oy-20);

  // force direction cue
  ctx.fillText("Force direction is perpendicular to both v and B", 20, 70);
  ctx.fillText("Right-hand rule applies for positive q", 20, 98);

  // into page symbols
  for(let y=150;y<=430;y+=55){
    for(let x=470;x<=680;x+=55){
      ctx.beginPath();
      ctx.arc(x,y,9,0,Math.PI*2);
      ctx.strokeStyle = "#c0392b";
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x-5,y-5); ctx.lineTo(x+5,y+5); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x-5,y+5); ctx.lineTo(x+5,y-5); ctx.stroke();
    }
  }
  ctx.fillText("Sample field texture", 500, 110);
}

function drawArrow(x1,y1,x2,y2,color){
  const head = 12;
  const angle = Math.atan2(y2-y1,x2-x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
}

document.getElementById('btn').addEventListener('click', compute);
compute();
</script>
</body>
</html>
