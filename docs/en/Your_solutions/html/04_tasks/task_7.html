<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 07 - Cyclotron Motion</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f8fc}
    .container{max-width:1160px;margin:0 auto;padding:20px;display:grid;grid-template-columns:340px 1fr;gap:20px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    label{display:block;margin-top:10px;font-weight:700}
    input{width:100%;padding:10px;border:1px solid #d3ddea;border-radius:10px;box-sizing:border-box;margin-top:6px}
    button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;font-weight:700;cursor:pointer}
    .out{margin-top:14px;background:#f7f9fc;padding:12px;border-radius:10px;line-height:1.7}
    canvas{width:100%;height:auto;border:1px solid #dbe4ef;border-radius:12px;background:#fff}
    @media (max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Task 07</h1>
    <p>Electron speed and cyclotron radius calculator with animated orbit.</p>

    <label>Accelerating voltage V (V)</label>
    <input id="V" type="number" step="100" value="5000">

    <label>Magnetic field B (T)</label>
    <input id="B" type="number" step="0.01" value="0.1">

    <label>Electron charge e (C)</label>
    <input id="e" type="number" step="1e-20" value="1.6e-19">

    <label>Electron mass m (kg)</label>
    <input id="m" type="number" step="1e-31" value="9.11e-31">

    <button id="btn">Compute</button>
    <div class="out" id="out"></div>
  </div>

  <div class="card">
    <h2>Animated Circular Motion</h2>
    <canvas id="canvas" width="760" height="520"></canvas>
  </div>
</div>

<script>
const out = document.getElementById('out');
const ctx = document.getElementById('canvas').getContext('2d');
let state = {r:0,v:0,omega:0,angle:0};

function compute(){
  const V = parseFloat(document.getElementById('V').value);
  const B = parseFloat(document.getElementById('B').value);
  const e = parseFloat(document.getElementById('e').value);
  const m = parseFloat(document.getElementById('m').value);

  const v = Math.sqrt(2*e*V/m);
  const r = m*v/(e*B);
  const omega = v/r;

  state = {r,v,omega,angle:0};

  out.innerHTML = `
    <strong>Speed after acceleration:</strong> ${v.toExponential(6)} m/s<br>
    <strong>Orbit radius:</strong> ${r.toExponential(6)} m<br>
    <strong>Angular speed:</strong> ${omega.toExponential(6)} rad/s
  `;
}
function draw(){
  ctx.clearRect(0,0,760,520);

  const cx = 380, cy = 260;
  const drawR = Math.min(170, Math.max(40, state.r * 60000));

  // magnetic field symbols
  ctx.fillStyle = "#cfe6ff";
  for(let y=70;y<=450;y+=55){
    for(let x=80;x<=680;x+=55){
      ctx.beginPath();
      ctx.arc(x,y,10,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "#4b8bd6";
      ctx.beginPath(); ctx.moveTo(x-5,y-5); ctx.lineTo(x+5,y+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-5,y+5); ctx.lineTo(x+5,y-5); ctx.stroke();
    }
  }

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx,cy,drawR,0,Math.PI*2);
  ctx.stroke();

  const x = cx + drawR*Math.cos(state.angle);
  const y = cy + drawR*Math.sin(state.angle);

  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.fillStyle = "#e74c3c";
  ctx.fill();

  ctx.fillStyle = "#111";
  ctx.font = "18px Arial";
  ctx.fillText(`Displayed orbit radius`, 20, 30);
  ctx.fillText(`Physical r = ${state.r.toExponential(3)} m`, 20, 58);
  ctx.fillText(`v = ${state.v.toExponential(3)} m/s`, 20, 86);
  ctx.fillText(`B into page`, 20, 114);

  // velocity arrow tangent
  const vx = -Math.sin(state.angle);
  const vy = Math.cos(state.angle);
  drawArrow(x,y,x+vx*45,y+vy*45,"#27ae60");

  state.angle += 0.03;
  requestAnimationFrame(draw);
}
function drawArrow(x1,y1,x2,y2,color){
  const head = 10;
  const angle = Math.atan2(y2-y1,x2-x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
}
document.getElementById('btn').addEventListener('click', compute);
compute();
draw();
</script>
</body>
</html>
