<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 03 - Electrostatic Equilibrium</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f7fb}
    .container{max-width:1100px;margin:0 auto;padding:20px;display:grid;grid-template-columns:340px 1fr;gap:20px}
    .card{background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:18px}
    label{display:block;font-weight:700;margin-top:10px}
    input{width:100%;padding:10px;margin-top:6px;border:1px solid #d0d9e6;border-radius:10px;box-sizing:border-box}
    button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;font-weight:700;cursor:pointer}
    canvas{width:100%;height:auto;border:1px solid #dce4ef;border-radius:12px}
    .out{margin-top:14px;background:#f7f9fc;padding:12px;border-radius:10px;line-height:1.6}
    @media (max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Task 03</h1>
      <p>Interactive equilibrium solver between two like charges.</p>

      <label>q₁ (C)</label>
      <input id="q1" type="number" step="0.1" value="4">

      <label>q₂ (C)</label>
      <input id="q2" type="number" step="0.1" value="9">

      <label>Separation d (m)</label>
      <input id="d" type="number" step="0.1" value="2">

      <label>Test charge q₃ (C)</label>
      <input id="q3" type="number" step="0.1" value="1">

      <button id="solve">Solve</button>
      <div class="out" id="out"></div>
    </div>

    <div class="card">
      <h2>Force Balance Visualization</h2>
      <canvas id="canvas" width="700" height="420"></canvas>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('canvas').getContext('2d');
    const out = document.getElementById('out');

    function drawSystem(q1,q2,d,xeq){
      ctx.clearRect(0,0,700,420);
      const left = 80, right = 620, y = 210;
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(left,y);
      ctx.lineTo(right,y);
      ctx.stroke();

      const scale = (right-left)/d;
      const x1 = left;
      const x2 = left + d*scale;
      const x3 = left + xeq*scale;

      function charge(x,color,label){
        ctx.beginPath();
        ctx.arc(x,y,16,0,Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.fillStyle = "#111";
        ctx.font = "16px Arial";
        ctx.fillText(label, x-18, y-28);
      }

      charge(x1,"#e74c3c",`q₁=${q1}`);
      charge(x2,"#e74c3c",`q₂=${q2}`);
      charge(x3,"#2e86de","q₃");

      ctx.fillText("0 m", x1-10, y+40);
      ctx.fillText(`${d} m`, x2-12, y+40);
      ctx.fillText(`x = ${xeq.toFixed(3)} m`, x3-40, y+70);

      const arrowLen = 70;
      ctx.strokeStyle = "#27ae60";
      ctx.fillStyle = "#27ae60";
      ctx.lineWidth = 3;

      // left force
      drawArrow(x3, y-70, x3 + arrowLen, y-70, "#27ae60");
      // right force
      drawArrow(x3, y-35, x3 - arrowLen, y-35, "#8e44ad");

      ctx.fillStyle = "#111";
      ctx.fillText("Force from q₁", x3 + 80, y-65);
      ctx.fillText("Force from q₂", x3 - 150, y-30);
    }

    function drawArrow(x1,y1,x2,y2,color){
      const head = 10;
      const angle = Math.atan2(y2-y1,x2-x1);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2,y2);
      ctx.lineTo(x2 - head*Math.cos(angle - Math.PI/6), y2 - head*Math.sin(angle - Math.PI/6));
      ctx.lineTo(x2 - head*Math.cos(angle + Math.PI/6), y2 - head*Math.sin(angle + Math.PI/6));
      ctx.closePath();
      ctx.fill();
    }

    function solve(){
      const q1 = parseFloat(document.getElementById('q1').value);
      const q2 = parseFloat(document.getElementById('q2').value);
      const d = parseFloat(document.getElementById('d').value);
      const q3 = parseFloat(document.getElementById('q3').value);

      const x = d * Math.sqrt(Math.abs(q1)) / (Math.sqrt(Math.abs(q1)) + Math.sqrt(Math.abs(q2)));

      out.innerHTML = `
        <strong>Equilibrium location from q₁:</strong> ${x.toFixed(6)} m<br>
        <strong>Distance from q₂:</strong> ${(d-x).toFixed(6)} m<br>
        <strong>Condition used:</strong> q₁ / x² = q₂ / (d - x)²<br>
        <strong>Test charge sign:</strong> ${q3 >= 0 ? "positive" : "negative"} (position formula unchanged for zero-force field point)
      `;
      drawSystem(q1,q2,d,x);
    }

    document.getElementById('solve').addEventListener('click', solve);
    solve();
  </script>
</body>
</html>
