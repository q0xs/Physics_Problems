<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 10 - Magnetic Force on a Wire</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f8fc}
    .container{max-width:1140px;margin:0 auto;padding:20px;display:grid;grid-template-columns:340px 1fr;gap:20px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    label{display:block;margin-top:10px;font-weight:700}
    input{width:100%;padding:10px;border:1px solid #d4deea;border-radius:10px;box-sizing:border-box;margin-top:6px}
    button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;font-weight:700;cursor:pointer}
    .out{margin-top:14px;background:#f7f9fc;padding:12px;border-radius:10px;line-height:1.8}
    canvas{width:100%;height:auto;border:1px solid #dde5ef;border-radius:12px;background:#fff}
    @media (max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Task 10</h1>
    <p>Interactive force calculator for a current-carrying wire.</p>

    <label>Current I (A)</label>
    <input id="I" type="number" step="0.5" value="10">

    <label>Wire length L (m)</label>
    <input id="L" type="number" step="0.1" value="2">

    <label>Magnetic field B (T)</label>
    <input id="B" type="number" step="0.1" value="0.5">

    <label>Angle θ (degrees)</label>
    <input id="theta" type="number" step="1" value="45">

    <button id="btn">Compute</button>
    <div class="out" id="out"></div>
  </div>

  <div class="card">
    <h2>Wire-Field Geometry</h2>
    <canvas id="canvas" width="740" height="520"></canvas>
  </div>
</div>

<script>
const out = document.getElementById('out');
const ctx = document.getElementById('canvas').getContext('2d');

function compute(){
  const I = parseFloat(document.getElementById('I').value);
  const L = parseFloat(document.getElementById('L').value);
  const B = parseFloat(document.getElementById('B').value);
  const thetaDeg = parseFloat(document.getElementById('theta').value);
  const theta = thetaDeg*Math.PI/180;
  const F = I*L*B*Math.sin(theta);

  out.innerHTML = `
    <strong>Force magnitude:</strong> ${F.toExponential(6)} N<br>
    <strong>Formula:</strong> F = ILB sinθ<br>
    <strong>Special values:</strong><br>
    &nbsp;&nbsp;θ = 90° → ${(I*L*B).toExponential(4)} N<br>
    &nbsp;&nbsp;θ = 45° → ${(I*L*B*Math.sin(Math.PI/4)).toExponential(4)} N<br>
    &nbsp;&nbsp;θ = 0° → ${(I*L*B*Math.sin(0)).toExponential(4)} N
  `;
  draw(thetaDeg,F);
}

function draw(thetaDeg,F){
  ctx.clearRect(0,0,740,520);

  // field arrows
  for(let y=80;y<=430;y+=50){
    drawArrow(80,y,280,y,"#3498db");
  }
  ctx.fillStyle = "#111";
  ctx.font = "18px Arial";
  ctx.fillText("Magnetic field B", 90, 40);

  const ox = 420, oy = 280, len = 170;
  const theta = thetaDeg*Math.PI/180;
  const x2 = ox + len*Math.cos(-theta);
  const y2 = oy + len*Math.sin(-theta);

  drawArrow(ox,oy,x2,y2,"#e74c3c");
  ctx.fillText("Wire / current direction", ox-20, oy+40);

  // angle arc
  ctx.strokeStyle = "#7f8c8d";
  ctx.beginPath();
  ctx.arc(ox,oy,60,0,-theta,true);
  ctx.stroke();
  ctx.fillText(`θ = ${thetaDeg.toFixed(1)}°`, ox+45, oy-18);

  // force note
  ctx.fillText(`F = ${F.toExponential(3)} N`, 420, 60);
  ctx.fillText("Force is perpendicular to both current and field", 340, 90);
}

function drawArrow(x1,y1,x2,y2,color){
  const head = 10;
  const angle = Math.atan2(y2-y1,x2-x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
  ctx.closePath();
  ctx.fill();
}

document.getElementById('btn').addEventListener('click', compute);
compute();
</script>
</body>
</html>
