<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 09 - Vector Lorentz Force</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f8fc}
    .container{max-width:1180px;margin:0 auto;padding:20px;display:grid;grid-template-columns:350px 1fr;gap:20px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    label{display:block;margin-top:10px;font-weight:700}
    input{width:100%;padding:10px;border:1px solid #d3ddea;border-radius:10px;box-sizing:border-box;margin-top:6px}
    button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;font-weight:700;cursor:pointer}
    .out{margin-top:14px;background:#f7f9fc;padding:12px;border-radius:10px;line-height:1.7}
    canvas{width:100%;height:auto;border:1px solid #dde5ef;border-radius:12px;background:#fff}
    @media (max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Task 09</h1>
    <p>Interactive cross-product calculator for $\vec F = q \vec v \times \vec B$.</p>

    <label>vₓ</label><input id="vx" type="number" step="0.1" value="2">
    <label>vᵧ</label><input id="vy" type="number" step="0.1" value="-4">
    <label>v_z</label><input id="vz" type="number" step="0.1" value="1">

    <label>Bₓ</label><input id="bx" type="number" step="0.1" value="1">
    <label>Bᵧ</label><input id="by" type="number" step="0.1" value="2">
    <label>B_z</label><input id="bz" type="number" step="0.1" value="-1">

    <label>Charge q (C)</label><input id="q" type="number" step="1e-20" value="1.6e-19">

    <button id="btn">Compute</button>
    <div class="out" id="out"></div>
  </div>

  <div class="card">
    <h2>Projected Vector Diagram</h2>
    <canvas id="canvas" width="760" height="560"></canvas>
  </div>
</div>

<script>
const out = document.getElementById('out');
const ctx = document.getElementById('canvas').getContext('2d');

function compute(){
  const vx = parseFloat(document.getElementById('vx').value);
  const vy = parseFloat(document.getElementById('vy').value);
  const vz = parseFloat(document.getElementById('vz').value);
  const bx = parseFloat(document.getElementById('bx').value);
  const by = parseFloat(document.getElementById('by').value);
  const bz = parseFloat(document.getElementById('bz').value);
  const q = parseFloat(document.getElementById('q').value);

  const cx = vy*bz - vz*by;
  const cy = -(vx*bz - vz*bx);
  const cz = vx*by - vy*bx;
  const mag = Math.hypot(cx,cy,cz);
  const F = Math.abs(q)*mag;

  out.innerHTML = `
    <strong>v × B:</strong> (${cx.toFixed(4)}, ${cy.toFixed(4)}, ${cz.toFixed(4)})<br>
    <strong>|v × B|:</strong> ${mag.toFixed(6)}<br>
    <strong>|F|:</strong> ${F.toExponential(6)} N
  `;
  draw({vx,vy,vz,bx,by,bz,cx,cy,cz});
}

function project(x,y,z){
  const sx = 380 + x*40 + z*20;
  const sy = 330 - y*40 - z*20;
  return {x:sx,y:sy};
}

function drawArrow(p1,p2,color,label){
  const head = 10;
  const angle = Math.atan2(p2.y-p1.y,p2.x-p1.x);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p2.x,p2.y);
  ctx.lineTo(p2.x-head*Math.cos(angle-Math.PI/6), p2.y-head*Math.sin(angle-Math.PI/6));
  ctx.lineTo(p2.x-head*Math.cos(angle+Math.PI/6), p2.y-head*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
  ctx.fillText(label, p2.x+10, p2.y);
}

function draw(v){
  ctx.clearRect(0,0,760,560);

  const O = project(0,0,0);
  const X = project(4,0,0);
  const Y = project(0,4,0);
  const Z = project(0,0,4);

  ctx.strokeStyle = "#777";
  ctx.lineWidth = 2;
  [[O,X,"x"],[O,Y,"y"],[O,Z,"z"]].forEach(([a,b,label])=>{
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.fillStyle = "#111"; ctx.fillText(label, b.x+8, b.y+8);
  });

  drawArrow(O, project(v.vx,v.vy,v.vz), "#27ae60", "v");
  drawArrow(O, project(v.bx,v.by,v.bz), "#3498db", "B");
  drawArrow(O, project(v.cx,v.cy,v.cz), "#e74c3c", "v×B");

  ctx.fillStyle = "#111";
  ctx.font = "18px Arial";
  ctx.fillText("3D vectors shown in an oblique 2D projection", 20, 30);
}
document.getElementById('btn').addEventListener('click', compute);
compute();
</script>
</body>
</html>
